baseURL = "https://salpagarov.com"
title = "salpagarov.com"
theme = "hugo-coder"
languageCode = "en"
defaultContentLanguage = "ru"
enableEmoji = true

[pagination]
pagerSize = 1000

[services]
    [services.disqus]
    # shortname = "yourdiscussshortname"

[markup]
    [markup.highlight]
    noClasses = false

[markup.goldmark]
    [markup.goldmark.renderer]
    unsafe = true

[params]
avatarURL = "images/avatar.jpg"
dateFormat = "2 January, 2006"
since = 2026
commit = "https://github.com/luizdepra/hugo-coder/tree/"
rtl = false
colorScheme = "auto"
hideColorSchemeToggle = false
maxSeeAlsoItems = 5
customCSS = []
customSCSS = []
customJS = []
customRemoteJS = []

[taxonomies]
category = "categories"
series = "series"
tag = "tags"
author = "authors"

[[params.social]]
name = "Github"
icon = "fa-brands fa-github fa-2x"
weight = 1
url = "https://github.com/salpagarov/"

[[params.social]]
name = "Telegram"
icon = "fa-brands fa-telegram fa-2x"
weight = 1
url = "https://t.me/esbea"

[languages.en]
languageName = ":uk:"

    [languages.en.params]
    author = "Sultan 'Sol' Salpagarov"
    description = "personal website"
    keywords = "blog,developer,personal"
    info = ["Software Developer", "System & Security Architect"]

    [[languages.en.menu.main]]
    name = "About"
    weight = 1
    url = "about/"

    [[languages.en.menu.main]]
    name = "CV"
    weight = 1
    url = "cv/"

[languages.ru]
languageName = ":ru:"

    [languages.ru.params]
